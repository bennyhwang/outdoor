name: Fetch News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch finance news
        run: |
          mkdir -p news
          curl -s "https://feed.mix.sina.com.cn/api/roll/get?pageid=153&num=15&lid=2509" -o news/finance.json

      - name: Fetch world news
        run: |
          curl -s "https://feed.mix.sina.com.cn/api/roll/get?pageid=153&num=15&lid=2510" -o news/world.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update news data"
          git push
